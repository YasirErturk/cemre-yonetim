<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemre Apartmanı | Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="logo-area">
            <!-- Tıklayınca hem sayfayı yenilemez hem de "Hareketler" sekmesini açar -->
<div class="logo" onclick="showTab('kayitlar')" style="cursor:pointer">Cemre<span>Apartmanı</span></div>
        </div>
        <div id="loginDiv" class="header-auth">
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button id="loginBtn">Giriş</button>
        </div>
        <div id="timerDisplay" class="header-admin-tools" style="display:none;">
            <div class="timer-box">Oturum: <span id="countdown">10:00</span></div>
            <button id="topLogoutBtn" class="logout-btn">Güvenli Çıkış</button>
        </div>
    </div>
</header>

<main class="container">
    <!-- Özet Kartları -->
<div class="stats-grid">
    <div class="stat-card bakiye"><small>Genel Kasa</small><h2 id="totalGenel">0.00 TL</h2></div>
    <div class="stat-card banka"><small>Havale / EFT Hesabı</small><h2 id="totalBanka">0.00 TL</h2></div>
    <div class="stat-card nakit"><small>Nakit</small><h2 id="totalNakit">0.00 TL</h2></div>
</div>

    <!-- Sekme Menüsü -->
    <div id="tabButtons" class="tab-container" style="display:none;">
        <button id="tab-kayitlar" class="tab-btn active" onclick="showTab('kayitlar')">Hareketler</button>
        <button id="tab-odeme-tablosu" class="tab-btn" onclick="showTab('odeme-tablosu')">Ödeme Tablosu</button>
        <button id="tab-sakinler" class="tab-btn" onclick="showTab('sakinler')">Sakinler</button>
    </div>

    <!-- 1. SEKME: HAREKETLER -->
    <div id="kayitlarTab">
        <section class="filter-section">
            <div class="filter-grid">
                <input type="text" id="searchFilter" placeholder="İşlem ara..." oninput="listeleVeriler()">
                <select id="daireFilter" onchange="listeleVeriler()"><option value="all">Tüm Daireler</option></select>
                <select id="yearFilter" onchange="listeleVeriler()">
                    <option value="all">Tüm Yıllar</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                </select>
                <select id="typeFilter" onchange="listeleVeriler()">
                    <option value="all">Gelir / Gider</option>
                    <option value="Aidat">Aidat Geliri</option>
                    <option value="Gider">Giderler</option>
                </select>
                <select id="walletFilter" onchange="listeleVeriler()">
                    <option value="all">Kasa Tipi</option>
                    <option value="Havale/EFT">Havale/EFT</option>
                    <option value="Nakit">Nakit</option>
                </select>
            </div>
        </section>

        <section id="adminDiv" class="add-data-section" style="display:none;">
            <h3>Yeni İşlem Kaydı</h3>
            <div class="input-grid-large">
                <input type="date" id="islemTarihi">
                <select id="sakinSecici"></select>
                <select id="kategori">
                    <option value="Aidat">Aidat Geliri</option>
                    <option value="Gider">Genel Gider</option>
                    <option value="Fatura">Fatura Ödemesi</option>
                </select>
                <select id="kasaTipi">
    <option value="Havale/EFT">Havale / EFT</option>
    <option value="Nakit">Nakit</option>
</select>
                <input type="number" id="tutar" placeholder="Tutar">
                <input type="text" id="detay" placeholder="Açıklama">
                <button id="ekleBtn" class="fancy-btn">KAYDET</button>
            </div>
        </section>
        <ul id="veriListesi"></ul>
    </div>

    <!-- 2. SEKME: ÖDEME TABLOSU -->
    <div id="odeme-tablosuTab" style="display:none;">
        <div class="table-header-box">
            <h3>Yıllık Aidat Takip Çizelgesi</h3>
            <select id="tableYearFilter" onchange="renderPaymentTable()">
                <option value="2025">2025 Yılı</option>
                <option value="2026" selected>2026 Yılı</option>
            </select>
        </div>
        <div class="table-responsive">
            <table class="excel-table">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 3. SEKME: SAKİNLER -->
    <div id="sakinlerTab" style="display:none;">
        <section class="add-data-section" style="border-left-color: #f59e0b">
            <h3>Sakin Tanımla</h3>
            <div class="input-grid-large">
                <input type="number" id="inputDaireNo" placeholder="Daire No">
                <input type="text" id="inputAdSoyad" placeholder="Ad Soyad">
                <button id="sakinKaydetBtn" class="fancy-btn" style="background:#f59e0b">EKLE</button>
            </div>
        </section>
        <ul id="sakinListesi"></ul>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
