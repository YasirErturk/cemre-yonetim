<!DOCTYPE html>
<html lang="tr">
<head>

    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemre Apartmanı | Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <meta name="theme-color" content="#3b82f6">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="logo-area">
            <div class="logo" onclick="showTab('kayitlar')" style="cursor:pointer">Cemre<span>Apartmanı</span></div>
        </div>
        <div id="loginDiv" class="header-auth">
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button id="loginBtn">Giriş</button>
        </div>
        <div id="timerDisplay" class="header-admin-tools" style="display:none;">
            <div class="timer-box">Oturum: <span id="countdown">10:00</span></div>
            <button id="topLogoutBtn" class="logout-btn">Güvenli Çıkış</button>
        </div>
    </div>
</header>

<main class="container">
    <div class="stats-grid">
        <div class="stat-card bakiye" ondblclick="openBakiyeModal('Genel')" style="cursor:pointer" title="Detaylar için çift tıklayın">
            <small>Genel Kasa</small><h2 id="totalGenel">0.00 TL</h2>
        </div>
        <div class="stat-card banka" ondblclick="openBakiyeModal('Havale/EFT')" style="cursor:pointer" title="Detaylar için çift tıklayın">
            <small>Banka Hesabı</small><h2 id="totalBanka">0.00 TL</h2>
        </div>
        <div class="stat-card nakit" ondblclick="openBakiyeModal('Nakit')" style="cursor:pointer" title="Detaylar için çift tıklayın">
            <small>Nakit</small><h2 id="totalNakit">0.00 TL</h2>
        </div>
    </div>

    <div id="tabButtons" class="tab-container">
        <button id="tab-kayitlar" class="tab-btn active" onclick="showTab('kayitlar')">Hareketler</button>
        <button id="tab-odeme-tablosu" class="tab-btn" onclick="showTab('odeme-tablosu')">Ödeme Tablosu</button>
        <button id="tab-sakinler" class="tab-btn" onclick="showTab('sakinler')">Sakinler</button>
    </div>

    <div id="kayitlarTab">

        <section class="filter-section">
	<h3>İşlem Filtreleme</h3>
            <div class="filter-grid">

                <input type="text" id="searchFilter" placeholder="İşlem ara..." oninput="listeleVeriler()">
                <select id="daireFilter" onchange="listeleVeriler()"><option value="all">Tüm Daireler</option></select>
                <select id="yearFilter" onchange="listeleVeriler()">
                    <option value="all">Tüm Yıllar</option>
                    <!-- Diğer seçenekleri sildik, JS dolduracak -->
                </select>

                <select id="typeFilter" onchange="listeleVeriler()">
                    <option value="all">Gelir / Gider</option>
                    <option value="Aidat">Aidat Geliri</option>
                    <option value="Gider">Giderler</option>
                </select>

                <select id="walletFilter" onchange="listeleVeriler()">
                    <option value="all">Kasa Tipi</option>
                    <option value="Havale/EFT">Banka (EFT)</option>
                    <option value="Nakit">Nakit</option>
                </select>

            </div>
        </section>

<section id="adminDiv" class="add-data-section" style="display:none;">
    <h3>Yeni İşlem Kaydı</h3>
    <div class="input-grid-large">
        <!-- 1. İşlem Tarihi -->
        <div class="form-group">
            <label>İşlem Tarihi</label>
            <input type="date" id="islemTarihi" required onkeydown="return false" onclick="this.showPicker()">
        </div>

        <!-- 2. İşlem Türü -->
<div class="form-group">
    <label>İşlem Türü</label>
    <select id="kategori">
        <option value="" selected>İşlem Seçiniz...</option> 
        <option value="Aidat">Aidat Geliri</option>
        <option value="Ekstra Gelir">Ekstra Gelir</option>
        <option value="Fatura">Fatura Ödemesi</option>
        <option value="Gider">Genel Gider</option>
    </select>
</div>

        <!-- 3. Ödeme Yapan / Yer (Dinamik dolacak) -->
        <div class="form-group">
            <label id="odemeYapanLabel">Ödeme Yapan</label>
           	<select id="sakinSecici">
			<option value="">Önce İşlem Türü Seçin...</option>
		</select>
        </div>

        <!-- 4. Ödeme Tipi -->
        <div class="form-group">
            <label>Ödeme Tipi</label>
            <select id="kasaTipi">
                <option value="Havale/EFT">Havale / EFT</option>
                <option value="Nakit">Nakit</option>
            </select>
        </div>

        <!-- 5. Tutar -->
        <div class="form-group">
            <label>Tutar (TL)</label>
            <input type="number" id="tutar" placeholder="0.00">
        </div>

        <!-- 6. Açıklama (Otomatik dolacak) -->
        <div class="form-group">
            <label>Açıklama</label>
            <input type="text" id="detay" placeholder="Detay giriniz...">
        </div>

        <div class="form-group">
            <label>&nbsp;</label>
            <button id="ekleBtn" class="fancy-btn">KAYDET</button>
        </div>
    </div>
</section>


        <ul id="veriListesi"></ul>
    </div>

    <div id="odeme-tablosuTab" style="display:none;">
        <div class="table-header-box">
            <h3>Yıllık Aidat Takip Çizelgesi</h3>
            <select id="tableYearFilter" onchange="renderPaymentTable()">
                <!-- Seçenekleri sildik, JS dolduracak -->
            </select>
        </div>
        <div class="table-responsive"><table class="excel-table"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
    </div>

    <div id="sakinlerTab" style="display:none;">
        <section id="sakinEkleDiv" class="add-data-section" style="border-left-color: #f59e0b; display:none;">
            <h3>Sakin Tanımla</h3>
            <div class="input-grid-large">
                <select id="inputDaireNo"></select>
                <input type="text" id="inputAdSoyad" placeholder="Ad Soyad">
                <button id="sakinKaydetBtn" class="fancy-btn" style="background:#f59e0b">EKLE</button>
            </div>
        </section>
        <ul id="sakinListesi"></ul>
    </div>

    <!-- Modallar -->
    <div id="hareketModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 500px;">
            <h3>İşlem Düzenle</h3>
            <input type="hidden" id="editHareketId">
            <div class="modal-grid">
                <div><label class="modal-label">Tarih</label><input type="date" id="editHareketTarihi" class="modal-input"></div>
                <div><label class="modal-label">Sakin</label><select id="editHareketSakin" class="modal-input"></select></div>
                <div><label class="modal-label">Kategori</label>
                
                <select id="editHareketKategori" class="modal-input">
                    <option value="Aidat">Aidat</option>
                    <option value="Ekstra Gelir">Ekstra Gelir</option> <!-- EKLE -->
                    <option value="Gider">Gider</option>
                    <option value="Fatura">Fatura</option>
                </select>
                </div>

                
                <div><label class="modal-label">Kasa</label><select id="editHareketKasa" class="modal-input"><option value="Havale/EFT">Banka</option><option value="Nakit">Nakit</option></select></div>
                <div><label class="modal-label">Tutar</label><input type="number" id="editHareketTutar" class="modal-input"></div>
                <div><label class="modal-label">Detay</label><input type="text" id="editHareketDetay" class="modal-input"></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="fancy-btn" style="background:#3b82f6; flex:1;" onclick="saveHareket()">Kaydet</button>
                <button class="fancy-btn" style="background:#ef4444; flex:1;" onclick="deleteHareket()">Sil</button>
                <button class="fancy-btn" style="background:#64748b; flex:1;" onclick="closeModal('hareketModal')">İptal</button>
            </div>
        </div>
    </div>

    <div id="sakinModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Sakin Düzenle</h3>
            <input type="hidden" id="editSakinId">
            <label class="modal-label">Daire No</label><select id="editSakinNo" class="modal-input"></select>
            <label class="modal-label">Ad Soyad</label><input type="text" id="editSakinAd" class="modal-input">
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="editSakinIsAdmin" style="width: 20px; height: 20px; cursor: pointer;">
                <label for="editSakinIsAdmin" style="cursor: pointer; font-weight: 600; color: #1e293b;">Bu Sakin Yönetici</label>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="fancy-btn" style="background:#3b82f6; flex:1;" onclick="saveSakin()">Kaydet</button>
                <button class="fancy-btn" style="background:#ef4444; flex:1;" onclick="deleteSakinAction()">Sil</button>
                <button class="fancy-btn" style="background:#64748b; flex:1;" onclick="closeModal('sakinModal')">İptal</button>
            </div>
        </div>
    </div>

    <div id="bakiyeModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 600px; max-height: 80vh; display: flex; flex-direction: column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid #e2e8f0; padding-bottom:10px;">
                <h3 id="bakiyeModalTitle" style="color:#0f172a; margin:0;">Kasa Detayları</h3>
                <button onclick="closeModal('bakiyeModal')" style="background:none; border:none; font-size:24px; cursor:pointer; color:#ef4444;">&times;</button>
            </div>
            <ul id="bakiyeListe" style="overflow-y:auto; flex:1; list-style:none; padding:0;"></ul>
        </div>
    </div>
</main>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
